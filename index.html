<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Background Editor</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="app">
        <div class="app-grid">

            <!-- ===== ควบคุม ===== -->
            <div class="controls">

    <h1>
        <img 
            src="https://od.lk/s/N18yNzAwOTQ0NzNf/11.png" 
            alt="🎨 Logo" 
            class="logo-icon"
            loading="lazy"
        />
    Remove background BP
    </h1>
                <div class="sub">This program was created byBอุ๋ยบางแคJ</div>

                <div class="group">
                    <label>🖼️ รูปหลัก <span class="badge">ลากได้</span></label>
                    <div class="file-wrap">
                        <input type="file" id="mainImage" accept="image/*" />
                        <div class="file-btn" id="mainFileBtn"><span class="icon">📂</span> เลือกรูป</div>
                        <span class="file-name" id="mainFileName">—</span>
                    </div>
                </div>

                <div class="group">
                    <label>🖼️ รูปพื้นหลัง</label>
                    <div class="file-wrap">
                        <input type="file" id="bgImage" accept="image/*" />
                        <div class="file-btn" id="bgFileBtn"><span class="icon">📂</span> เลือกรูป</div>
                        <span class="file-name" id="bgFileName">—</span>
                    </div>
                </div>

                <div class="group">
                    <label>🎨 สีพื้นหลัง</label>
                    <div class="color-row">
                        <input type="color" id="bgColor" value="#600203" />
                        <span class="color-hex" id="colorHex">#600203</span>
                        <span style="font-size:13px;color:#6f84a0;margin-left:auto;">⬅️ คลิก</span>
                    </div>
                </div>

                <!-- ===== รูปตัวอย่างพื้นหลัง ===== -->
                <div class="group" id="sampleGroup">
                    <label>🌄 รูปพื้นหลังตัวอย่าง <span class="badge">คลิกเลือก</span></label>
                    <div class="sample-grid" id="sampleGrid"></div>
                </div>

                <div class="group">
                    <label>🔍 ขนาดรูปหลัก <span class="badge" id="scaleLabel">80%</span></label>
                    <div class="slider-row">
                        <span style="font-size:13px;color:#6f84a0;">20%</span>
                        <input type="range" id="scaleSlider" min="10" max="100" value="80" />
                        <span style="font-size:13px;color:#6f84a0;">100%</span>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn-primary" id="downloadBtn">⬇️ ดาวน์โหลด PNG</button>
                    <button class="btn-secondary" id="resetBtn">↺ รีเซ็ต</button>
                </div>

                <!-- ปุ่มลบพื้นหลัง (AI) + progress bar -->
                <div class="group" style="margin-top:12px;">
                    <button class="btn-remove-bg" id="removeBgBtn">✨ ลบพื้นหลัง (AI)</button>
                    <div id="progressContainer" style="display:none; margin-top:8px; width:100%; height:4px; background:#2f3d52; border-radius:4px; overflow:hidden;">
                        <div id="progressFill" style="height:100%; width:0%; background:#6c5ce7; transition: width 0.2s;"></div>
                    </div>
                </div>

                <div class="info-row">
                    <span><span class="dot"></span> ลากรูปหลักเพื่อจัดตำแหน่ง</span>
                    <span>⌨️ ลูกศร → เลื่อน · กด 1 → ลบพื้นหลัง</span>
                </div>

            </div>

            <!-- ===== ตัวอย่าง ===== -->
            <div class="preview">

                <div class="preview-header">
                    <span class="title">📷 ตัวอย่าง</span>
                    <span class="dim" id="dimDisplay">1200 × 1200</span>
                </div>

                <div class="canvas-wrap" id="canvasWrap">
                    <canvas id="canvas" width="1200" height="1200"></canvas>
                </div>

                <div style="margin-top:14px;font-size:13px;color:#5f748f;display:flex;gap:18px;flex-wrap:wrap;justify-content:center;">
                    <span id="posDisplay">📍 ตำแหน่ง: 0, 0</span>
                    <span id="sizeDisplay">📐 ขนาด: 960 × 960</span>
                </div>

            </div>

        </div>
    </div>

    <script src="script.js"></script>
   <script src="script1.js"></script>
</body>
</html>
